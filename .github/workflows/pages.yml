name: Build and Deploy GitHub Pages

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "scripts/build_static_data.py"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static data snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_REPOS: "80"
          TREND_TOP_N: "40"
          NETWORK_MAX_EDGES: "240"
          MIN_SHARED_COUNT: "1"
          REQUEST_SLEEP_MS: "80"
          HTTP_TIMEOUT_SECONDS: "20"
          EVENT_MAX_PAGES: "5"
        run: |
          python scripts/build_static_data.py --output docs/data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs
          retention-days: 7

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
